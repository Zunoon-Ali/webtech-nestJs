version: "3.9"
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: skillforge
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: skillforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    env_file: .env

volumes:
  pgdata:
